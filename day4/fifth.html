<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        p::first-letter{
            font-size: 48px;
        }
        p::first-line{
            color: brown;
        }
        p::before{
            content:"good morning";
        }
        p::after{
            content:"good afternoon";
        }
    </style>
</head>
<body>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Delectus mollitia itaque quidem, nemo ratione et perspiciatis a ex dignissimos illum? </p>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Aperiam minus ex quibusdam unde a assumenda sed necessitatibus, perspiciatis molestias debitis!</p>
</body>
</html>
